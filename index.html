<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Фотогалерея</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik+Storm&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>

body {
    background: radial-gradient(circle at center, #000000, #0f0f0f, #000000);
    text-align: center;
    color: white;
    font-family: 'Montserrat', sans-serif;
}

/* Заголовок */
.text {
    font-family: 'Rubik Storm', cursive;
    font-size: 60px;
    color: #ff00ff;
    text-shadow: 0 0 20px #ff00ff, 0 0 60px #00ffff;
}

/* Блок */
.bio {
    max-width: 900px;
    margin: 40px auto;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
}

.name {
    font-size: 42px;
    text-shadow: 0 0 20px #00ffff;
}

.years {
    font-size: 24px;
    color: gold;
}

/* Галерея */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

img {
    width: 320px;
    height: 220px;
    object-fit: cover;
    margin: 20px;
    border-radius: 20px;
    transition: 0.4s;
}

img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff;
}

/* Кнопка */
button {
    margin: 30px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(45deg, #ff00ff, #00ffff);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

/* Факт */
#fact {
    font-size: 20px;
    margin-top: 20px;
    color: #00ffff;
}

</style>
</head>

<body>

<h1 class="text">Фотогалерея ⚡</h1>

<div class="bio">
    <h2 class="name">ОЛЕКСІЙ НАВАЛЬНИЙ</h2>
    <div class="years">1976–2024</div>

    <p>
        Відомий опозиційний політик, юрист та антикорупційний активіст.
    </p>
</div>

<h2>📸 Фото</h2>
<div class="gallery">
    <img src="https://static.dw.com/image/62146452_605.jpg">
    <img src="https://brf.be/wp-content/uploads/2023/12/nawalny1nataliakolesnikovaafp-1000x667.jpg">
    <img src="https://static.euronews.com/articles/stories/08/11/24/60/1200x675_cmsv2_b547ca18-8aab-5662-b6fd-6be1e3ec2593-8112460.jpg">
</div>

<button id="factBtn">Показати факт ⚡</button>
<div id="fact"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const button = document.getElementById("factBtn");
    const factBlock = document.getElementById("fact");

    const facts = [
        "Заснував Фонд боротьби з корупцією",
        "Його розслідування набирали мільйони переглядів",
        "Пережив отруєння у 2020 році",
        "Став символом опозиції в Росії"
    ];

    button.addEventListener("click", function () {
        const random = facts[Math.floor(Math.random() * facts.length)];
        factBlock.textContent = random;
    });

});
</script>

</body>
</html>
