<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Фотогалерея</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik+Storm&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    text-align: center;
    color: white;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;

    background: linear-gradient(270deg, #ff00ff, #00ffff, #ff0000, #00ff00, #ffff00, #ff00ff);
    background-size: 1200% 1200%;
    animation: gradientMove 12s ease infinite;
}

/* рух градієнта */
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* неонові світіння */
body::before,
body::after {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(150px);
    z-index: -1;
}

/* рожеве світло */
body::before {
    background: #ff00ff;
    top: 0;
    left: 0;
    animation: move1 10s infinite alternate;
}

/* блакитне світло */
body::after {
    background: #00ffff;
    bottom: 0;
    right: 0;
    animation: move2 12s infinite alternate;
}

@keyframes move1 {
    0% { transform: translate(0,0); }
    100% { transform: translate(300px, 150px); }
}

@keyframes move2 {
    0% { transform: translate(0,0); }
    100% { transform: translate(-300px, -150px); }
}

/* Заголовок */
.text {
    font-family: 'Rubik Storm', cursive;
    font-size: 70px;
    color: #ff00ff;
    text-shadow: 0 0 20px #ff00ff, 0 0 80px #00ffff;
}

/* Блок */
.bio {
    max-width: 900px;
    margin: 40px auto;
    padding: 30px;
    background: rgba(255,255,255,0.07);
    border-radius: 20px;
    box-shadow: 0 0 30px #ff00ff;
}

.name {
    font-size: 46px;
    text-shadow: 0 0 25px #00ffff;
}

.years {
    font-size: 26px;
    color: gold;
    text-shadow: 0 0 10px gold;
}

/* Галерея */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

img {
    width: 320px;
    height: 220px;
    object-fit: cover;
    margin: 20px;
    border-radius: 20px;
    transition: 0.4s;
}

img:hover {
    transform: scale(1.15) rotate(1deg);
    box-shadow: 0 0 40px #ff00ff, 0 0 100px #00ffff;
}

/* Кнопка */
button {
    margin: 40px;
    padding: 18px 40px;
    font-size: 22px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
    background-size: 300% 300%;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 30px #ff00ff;
    animation: glowBtn 4s infinite linear;
}

@keyframes glowBtn {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

button:hover {
    transform: scale(1.15);
}

/* ФАКТ — ГОЛОВНЕ */
#fact {
    font-size: 28px;
    font-weight: 600;
    margin-top: 30px;
    color: #ffffff;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;

    padding: 20px;
    border-radius: 20px;

    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 30px #00ffff, 0 0 60px #ff00ff;

    opacity: 0;
    transform: scale(0.9);
    transition: 0.4s;
}

/* коли показується */
#fact.show {
    opacity: 1;
    transform: scale(1);
}

</style>
</head>

<body>

<h1 class="text">Фотогалерея ⚡</h1>

<div class="bio">
    <h2 class="name">ОЛЕКСІЙ НАВАЛЬНИЙ</h2>
    <div class="years">1976–2024</div>

    <p>
        Відомий опозиційний політик, юрист та антикорупційний активіст.
    </p>
</div>

<h2>📸 Фото</h2>
<div class="gallery">
    <img src="https://static.dw.com/image/62146452_605.jpg">
    <img src="https://brf.be/wp-content/uploads/2023/12/nawalny1nataliakolesnikovaafp-1000x667.jpg">
    <img src="https://static.euronews.com/articles/stories/08/11/24/60/1200x675_cmsv2_b547ca18-8aab-5662-b6fd-6be1e3ec2593-8112460.jpg">
    <img src="https://st.navalny.com/media/cache/c8/ed/c8ed91a89d3398b1dcc2474dd17ed054.jpg">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFN6H2Hg3UxRDH0Z3MylTGLBsYMSrZiezRAQ&s">
</div>

<h2>👶 У дитинстві (приклад)</h2>
<div class="gallery">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTViJpJ3blnkSLwx7Jjg-fhZBEhiQksBg8F4g&s">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSjvcbHe2Qvl9ID8YN9A47sk1-v3XuSpmvdWQ&s">
</div>

<button id="factBtn">Показати факт ⚡</button>
<div id="fact"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const button = document.getElementById("factBtn");
    const factBlock = document.getElementById("fact");

    const facts = [
        "Заснував Фонд боротьби з корупцією",
        "Його розслідування набирали мільйони переглядів",
        "Пережив отруєння у 2020 році",
        "Став символом опозиції в Росії"
    ];

    button.addEventListener("click", function () {
        const random = facts[Math.floor(Math.random() * facts.length)];

        factBlock.classList.remove("show");

        setTimeout(() => {
            factBlock.textContent = random;
            factBlock.classList.add("show");
        }, 100);
    });

});
</script>

</body>
</html>
